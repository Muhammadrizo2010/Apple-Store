<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Animation</title>
    <link rel="stylesheet" href="apple.css">
    <style>
        .anim-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            background: radial-gradient(circle at top, rgba(0, 194, 255, 0.18), transparent 25%),
                        radial-gradient(circle at 20% 20%, rgba(255, 95, 184, 0.18), transparent 18%),
                        #06030f;
            color: white;
        }

        .anim-grid {
            max-width: 980px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            align-items: center;
            justify-items: center;
            padding: 40px 0 80px;
        }

        .anim-card-wrap {
            position: relative;
            width: 100%;
            max-width: 520px;
            aspect-ratio: 1 / 1;
            border-radius: 44px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 55px 130px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            animation: float 8s ease-in-out infinite;
        }

        .anim-stage {
            position: relative;
            min-height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .anim-link {
            display: block;
            width: 100%;
            text-decoration: none;
            color: inherit;
        }

        .anim-link:hover .anim-card-wrap {
            transform: translateY(-6px);
        }

        .anim-card-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(75, 181, 255, 0.18), transparent 32%);
            pointer-events: none;
        }

        .anim-card {
            position: relative;
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .anim-card img {
            width: auto;
            max-width: 320px;
            height: auto;
            object-fit: contain;
            transform: scale(1);
            filter: brightness(1) saturate(1.08);
            margin: 0 auto;
            animation: spin 10s linear infinite;
        }

        .anim-glow {
            position: absolute;
            inset: 18px;
            border-radius: 36px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(80, 144, 255, 0.06) 45%, transparent 70%);
            pointer-events: none;
        }

        .anim-shine {
            position: absolute;
            top: 42%;
            left: -20%;
            width: 180%;
            height: 260px;
            background: linear-gradient(110deg, rgba(255, 255, 255, 0.18), transparent 60%);
            transform: rotate(-25deg);
            animation: shine 3.5s ease-in-out infinite;
            pointer-events: none;
        }

        .anim-bubbles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .anim-bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 141, 255, 0.16);
            animation: bubble 7s ease-in-out infinite;
        }

        .anim-bubble:nth-child(1) {
            width: 110px;
            height: 110px;
            top: 8%;
            right: 12%;
            animation-delay: 0s;
        }

        .anim-bubble:nth-child(2) {
            width: 80px;
            height: 80px;
            bottom: 18%;
            left: 10%;
            animation-delay: 1.2s;
        }

        .anim-bubble:nth-child(3) {
            width: 54px;
            height: 54px;
            top: 22%;
            left: 18%;
            animation-delay: 2.1s;
        }

        .anim-bubble:nth-child(4) {
            width: 74px;
            height: 74px;
            bottom: 12%;
            right: 20%;
            animation-delay: 0.8s;
        }

        .back-button {
            margin-top: 40px;
            padding: 16px 36px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 16px;
            transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .back-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.35);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-16px); }
        }

        @keyframes shine {
            0%, 100% { transform: translateX(-5%) rotate(-25deg); opacity: 0.18; }
            50% { transform: translateX(105%) rotate(-25deg); opacity: 0.35; }
        }

        @keyframes bubble {
            0% { transform: translateY(0px) scale(1); opacity: 0.8; }
            50% { transform: translateY(-14px) scale(1.04); opacity: 0.7; }
            100% { transform: translateY(0px) scale(1); opacity: 0.8; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 980px) {
            .anim-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .anim-stage {
                margin-top: 40px;
            }
        }
    </style>
</head>
<body>
    <main class="anim-hero">
        <div class="anim-grid">
            <div class="anim-stage" id="magic">
            <a href="index.html" class="anim-link">
                <div class="anim-card-wrap">
                    <div class="anim-card">
                        <img src="image.png" alt="Animated Apple icon" />
                        <div class="anim-glow"></div>
                        <div class="anim-shine"></div>
                    </div>
                    <div class="anim-bubbles">
                        <span class="anim-bubble"></span>
                        <span class="anim-bubble"></span>
                    </div>
                </div>
            </a>
        </div>
        </div>
    </main>
</body>
</html>
